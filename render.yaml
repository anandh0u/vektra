services:
  - type: web
    name: vektra-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: BASE44_API_KEY
        sync: false
      - key: BASE44_APP_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STELLAR_TREASURY_SECRET
        sync: false
      - key: STELLAR_NETWORK
        value: testnet
      - key: RENDER_WORKFLOW_URL
        value: https://api.render.com/v1/workflows
      - key: RENDER_API_KEY
        sync: false

  - type: static
    name: vektra-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_STELLAR_NETWORK
        value: testnet
      - key: VITE_STELLAR_EXPLORER
        value: https://stellar.expert/explorer/testnet
      - key: VITE_RENDER_DASHBOARD
        value: https://dashboard.render.com

workflows:
  - name: policy-analysis-pipeline
    trigger:
      type: http
    steps:
      - name: step-1-parse
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/parse
        method: POST
        timeout: 30

      - name: step-2-graph
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/build-graph
        method: POST
        timeout: 60
        dependsOn: [step-1-parse]

      - name: step-3-neo4j
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/save-graph
        method: POST
        timeout: 30
        dependsOn: [step-2-graph]

      - name: step-3-base44
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/save-history
        method: POST
        timeout: 30
        dependsOn: [step-2-graph]

      - name: step-4-agents
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/run-analysts
        method: POST
        timeout: 120
        dependsOn: [step-2-graph]

      - name: step-5-fixes
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/run-fixes
        method: POST
        timeout: 120
        dependsOn: [step-4-agents]

      - name: step-6-score
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/run-scorer
        method: POST
        timeout: 60
        dependsOn: [step-5-fixes]

      - name: step-7-finalize
        type: http
        url: ${VEKTRA_BACKEND_URL}/api/internal/finalize
        method: POST
        timeout: 30
        dependsOn:
          - step-6-score
          - step-3-neo4j
          - step-3-base44
