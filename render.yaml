services:
  - type: web
    name: vektra-backend
    env: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: BASE44_API_KEY
        sync: false
      - key: BASE44_APP_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STELLAR_TREASURY_SECRET
        sync: false
      - key: STELLAR_NETWORK
        value: testnet
      - key: RENDER_WORKFLOW_URL
        value: https://api.render.com/v1/workflows
      - key: RENDER_API_KEY
        sync: false
